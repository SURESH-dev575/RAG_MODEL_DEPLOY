<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Copilot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo-area">
                <h2>🤖 AI Copilot</h2>
                <p>RAG + Web Search</p>
            </div>
            
            <div class="upload-section">
                <h3>Knowledge Base</h3>
                <p class="helper-text">Upload a document (.pdf, .txt, .docx) to teach the AI new information.</p>
                <input type="file" id="file-input" class="file-input">
                <button id="upload-btn" class="primary-btn upload-btn">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="18px" width="18px" xmlns="http://www.w3.org/2000/svg"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Upload Document
                </button>
                <div id="upload-msg" class="status-msg"></div>
            </div>
        </div>

        <div class="chat-area">
            <div id="chat-log" class="chat-log">
                <div class="msg bot">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        Hello! I am your Hybrid AI. Ask me a question! <br><br>
                        <em>Note: My very first response might take 1-2 minutes as I wake up my AI models. Please be patient!</em>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Message AI Copilot..." autocomplete="off">
                    <button id="send-btn" class="send-btn">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20px" width="20px" xmlns="http://www.w3.org/2000/svg"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
